name: Build/release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Match tag to package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node -e "const version = require('./package.json').version; const expected = 'v' + version; if (process.env.RELEASE_TAG !== expected) { console.error('Tag ' + process.env.RELEASE_TAG + ' does not match package version ' + expected); process.exit(1); }"

  release:
    name: Build ${{ matrix.platform }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS arm64
            os: macos-14
            script: build:mac:arm64
            artifact: release-macos-arm64
            files: |
              dist/*-arm64.dmg
              dist/*.dmg.blockmap
              dist/latest-mac.yml
          - platform: Windows x64
            os: windows-2022
            script: build:win:x64
            artifact: release-windows-x64
            files: |
              dist/*-x64-setup.exe
              dist/*-x64-setup.exe.blockmap
              dist/latest.yml
          - platform: Windows arm64
            os: windows-11-arm
            script: build:win:arm64
            artifact: release-windows-arm64
            files: |
              dist/*-arm64-setup.exe
              dist/*-arm64-setup.exe.blockmap

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm run ${{ matrix.script }}

      - name: Upload installers and update metadata
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out release history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate release notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT
          features_file="$temp_dir/features"
          fixes_file="$temp_dir/fixes"
          improvements_file="$temp_dir/improvements"
          conventional_pattern='^(feat|fix|perf|refactor)(\([^)]+\))?:[[:space:]]*(.+)$'
          : > "$features_file"
          : > "$fixes_file"
          : > "$improvements_file"

          previous_tag="$(git tag --merged "$RELEASE_TAG" --sort=-version:refname | grep -Fxv "$RELEASE_TAG" | head -n 1 || true)"
          if [ -n "$previous_tag" ]; then
            revision_range="$previous_tag..$RELEASE_TAG"
          else
            revision_range="$RELEASE_TAG"
          fi

          while IFS= read -r subject; do
            if [[ "$subject" =~ $conventional_pattern ]]; then
              kind="${BASH_REMATCH[1]}"
              description="${BASH_REMATCH[3]}"
            else
              continue
            fi

            case "$kind" in
              feat) target_file="$features_file" ;;
              fix) target_file="$fixes_file" ;;
              perf|refactor) target_file="$improvements_file" ;;
            esac
            printf -- '- %s\n' "$description" >> "$target_file"
          done < <(git log "$revision_range" --format='%s')

          append_section() {
            title="$1"
            file="$2"
            if [ -s "$file" ]; then
              printf '\n## %s\n\n' "$title" >> release-notes.md
              cat "$file" >> release-notes.md
            fi
          }

          {
            printf '# Vfan TV %s · 更新说明\n' "$RELEASE_TAG"
          } > release-notes.md
          append_section '✨ 新功能' "$features_file"
          append_section '🐛 问题修复' "$fixes_file"
          append_section '⚡ 体验优化' "$improvements_file"

          if ! [ -s "$features_file" ] && ! [ -s "$fixes_file" ] && ! [ -s "$improvements_file" ]; then
            printf '\n## 本次更新\n\n- 本次为维护性更新，提升了构建与发布稳定性。\n' >> release-notes.md
          fi

          cat >> release-notes.md <<'EOF'

          ## 下载与安装

          - **macOS Apple Silicon**：下载 `*-arm64.dmg`。
          - **Windows x64**：下载 `*-x64-setup.exe`。
          - **Windows ARM64**：下载 `*-arm64-setup.exe`。
          EOF

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$RELEASE_TAG" --yes --repo "$GITHUB_REPOSITORY"
          fi
          gh release create "$RELEASE_TAG" release-assets/* --verify-tag --notes-file release-notes.md --title "Vfan TV $RELEASE_TAG · 更新说明" --repo "$GITHUB_REPOSITORY"
