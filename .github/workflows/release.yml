name: Build/release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Match tag to package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node -e "const version = require('./package.json').version; const expected = 'v' + version; if (process.env.RELEASE_TAG !== expected) { console.error('Tag ' + process.env.RELEASE_TAG + ' does not match package version ' + expected); process.exit(1); }"

  release:
    name: Build ${{ matrix.platform }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS arm64
            os: macos-14
            script: build:mac:arm64
            artifact: release-macos-arm64
            files: |
              dist/*-arm64.dmg
              dist/*.dmg.blockmap
              dist/latest-mac.yml
          - platform: Windows x64
            os: windows-2022
            script: build:win:x64
            artifact: release-windows-x64
            files: |
              dist/*-x64-setup.exe
              dist/*-x64-setup.exe.blockmap
              dist/latest.yml
          - platform: Windows arm64
            os: windows-11-arm
            script: build:win:arm64
            artifact: release-windows-arm64
            files: |
              dist/*-arm64-setup.exe
              dist/*-arm64-setup.exe.blockmap

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm run ${{ matrix.script }}

      - name: Upload installers and update metadata
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$RELEASE_TAG" --yes --repo "$GITHUB_REPOSITORY"
          fi
          gh release create "$RELEASE_TAG" release-assets/* --verify-tag --generate-notes --title "Vfan TV $RELEASE_TAG" --repo "$GITHUB_REPOSITORY"
