name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Match tag to package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node -e "const version = require('./package.json').version; const expected = 'v' + version; if (process.env.RELEASE_TAG !== expected) { console.error('Tag ' + process.env.RELEASE_TAG + ' does not match package version ' + expected); process.exit(1); }"

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            command: pnpm run release:mac
            artifact: release-macos
            files: |
              dist/*.dmg
          - name: Windows
            os: windows-2022
            command: pnpm run release:win
            artifact: release-windows
            files: |
              dist/*.exe

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installers
        run: ${{ matrix.command }}

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$RELEASE_TAG" --yes --repo "$GITHUB_REPOSITORY"
          fi
          gh release create "$RELEASE_TAG" release-assets/* --verify-tag --generate-notes --title "VfanTV $RELEASE_TAG" --repo "$GITHUB_REPOSITORY"
